<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Outlet das Marias</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #ffe6ef, #fff);
  min-height: 100vh;
}

/* SECTIONS */
.section { display:none; padding:20px; }
.active { display:block; }

/* NAV */
nav {
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  padding: 18px;
  text-align: center;
}

nav button {
  color: white;
  background: none;
  border: none;
  margin: 0 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

nav button:hover { opacity: 0.7; }

/* TITULO */
.titulo {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 60px;
  color: #ff4d8d;
  letter-spacing: 3px;
  margin-bottom:5px;
}

.subtitulo {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

/* BUSCA */
#busca {
  padding: 12px;
  width: 280px;
  border-radius: 30px;
  border: none;
  outline: none;
  box-shadow: 0 4px 15px rgba(255,77,141,0.2);
  margin-bottom: 20px;
}

/* CATEGORIAS */
.categorias {
  text-align:center;
  margin-bottom: 20px;
}

.categorias button {
  margin: 6px;
  padding: 10px 18px;
  border-radius: 30px;
  border: none;
  background: #ff4d8d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.categorias button:hover { background: #e6005c; }

/* PRODUTOS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  gap: 20px;
}

.produto {
  width: 180px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
  background:white;
}

.produto:hover { transform: scale(1.05); }

.produto img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  object-position: top;
}

.produto-info {
  padding: 10px;
  text-align:center;
}

.produto-info h3 { font-size:16px; margin-bottom:5px; }
.produto-info p { font-size:14px; margin-bottom:5px; color:#555; }
.preco { font-weight:bold; color:#ff4d8d; }

/* BOTÃO */
.botao {
  display:block;
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  color:white;
  text-align:center;
  padding:10px;
  border-radius:30px;
  margin-top:10px;
  text-decoration:none;
  font-weight:bold;
}

/* ADMIN */
input, select {
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ffb3c6;
  background:#fff;
  width:100%;
}

button.admin-btn {
  margin-top:10px;
  padding:10px;
  border-radius:20px;
  border:none;
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  color:white;
  cursor:pointer;
}

button.admin-btn:hover { opacity:0.8; }

.admin-box {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow: 0 5px 15px rgba(255,77,141,0.2);
}

/* LISTA ADMIN */
#listaAdmin div {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
#listaAdmin input { flex:1; }
#listaAdmin button { flex:0.6; }
</style>
</head>

<body>

<nav>
  <button onclick="abrir('loja')">Loja</button>
  <button onclick="abrir('login')">Admin</button>
</nav>

<!-- LOJA -->
<div id="loja" class="section active">
  <h1 class="titulo">Outlet das Marias</h1>
  <p class="subtitulo">PERFUMES • ELEGÂNCIA • EXCLUSIVIDADE</p>

  <div style="text-align:center;">
    <input id="busca" placeholder="Buscar perfume..." onkeyup="carregar()">
  </div>

  <div class="categorias">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('internacional')">Internacionais</button>
    <button onclick="filtrar('arabes')">Árabes</button>
    <button onclick="filtrar('amadeirado')">Amadeirados</button>
    <button onclick="filtrar('citrico')">Cítricos</button>
    <button onclick="filtrar('doce')">Doces</button>
  </div>

  <div id="produtos" class="container"></div>
</div>

<!-- LOGIN ADMIN -->
<div id="login" class="section">
  <h2>Login Admin</h2>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button class="admin-btn" onclick="login()">Entrar</button>
</div>

<!-- TELA ADMIN -->
<div id="admin" class="section">

  <div class="admin-box">
    <h3>Adicionar Produto</h3>
    <input id="nome" placeholder="Nome">
    <input id="descricao" placeholder="Descrição">
    <input id="preco" placeholder="Preço">
    <input id="imagem" placeholder="URL da imagem">
    <select id="categoria">
      <option value="internacional">Internacional</option>
      <option value="arabes">Árabe</option>
      <option value="amadeirado">Amadeirado</option>
      <option value="citrico">Cítrico</option>
      <option value="doce">Doce</option>
    </select>
    <button class="admin-btn" onclick="addProduto()">Adicionar Produto</button>
  </div>

  <div class="admin-box">
    <h3>Produtos</h3>
    <div id="listaAdmin"></div>
  </div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCjnn8ZT_9N2oTUdhSTlEmG7ZGYy4TCycc",
  authDomain: "outlet-das-marias-c1123.firebaseapp.com",
  projectId: "outlet-das-marias-c1123",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// VARIÁVEIS
let categoriaAtual = "todos";

// FUNÇÕES
function abrir(sec){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(sec).classList.add('active');
}

function filtrar(cat){
  categoriaAtual = cat;
  carregar();
}

// LOGIN ADMIN
function login(){
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
  .then(async () => {
    let doc = await db.collection("admins").doc(email).get();
    if(doc.exists){
      abrir('admin');
    } else {
      alert("Sem permissão");
    }
  })
  .catch(err => alert("Erro no login: " + err.message));
}

// ADICIONAR PRODUTO
function addProduto(){
  const nomeVal = document.getElementById("nome").value;
  const descricaoVal = document.getElementById("descricao").value;
  const precoVal = document.getElementById("preco").value;
  const imagemVal = document.getElementById("imagem").value;
  const categoriaVal = document.getElementById("categoria").value;

  if(!nomeVal || !descricaoVal || !precoVal || !imagemVal){
    alert("Preencha todos os campos!");
    return;
  }

  db.collection("produtos").add({
    nome: nomeVal,
    descricao: descricaoVal,
    preco: precoVal,
    imagem: imagemVal,
    categoria: categoriaVal
  })
  .then(() => {
    alert("Produto adicionado com sucesso!");
    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("imagem").value = "";
    document.getElementById("categoria").value = "internacional";
  })
  .catch(err => {
    console.error(err);
    alert("Erro ao adicionar produto!");
  });
}

// EDITAR PRODUTO
function editar(id){
  db.collection("produtos").doc(id).update({
    nome: document.getElementById("nome_"+id).value,
    preco: document.getElementById("preco_"+id).value,
    imagem: document.getElementById("imagem_"+id).value
  });
}

// DELETAR PRODUTO
function deletar(id){
  db.collection("produtos").doc(id).delete();
}

// CARREGAR PRODUTOS
function carregar(){
  db.collection("produtos").onSnapshot(snapshot => {
    const loja = document.getElementById("produtos");
    const admin = document.getElementById("listaAdmin");
    const busca = document.getElementById("busca")?.value?.toLowerCase() || "";

    loja.innerHTML = "";
    admin.innerHTML = "";

    snapshot.forEach(doc => {
      const p = doc.data();
      if(categoriaAtual != "todos" && p.categoria != categoriaAtual) return;
      if(!p.nome.toLowerCase().includes(busca) && !p.descricao.toLowerCase().includes(busca)) return;

      // LOJA
      loja.innerHTML += `
      <div class="produto">
        <img src="${p.imagem}">
        <div class="produto-info">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>
          <p class="preco">R$ ${p.preco}</p>
          <a class="botao" href="https://wa.me/5515997869502?text=Olá,%20tenho%20interesse%20no%20produto:%20${p.nome}" target="_blank">
            Comprar
          </a>
        </div>
      </div>
      `;

      // ADMIN
      admin.innerHTML += `
      <div>
        <input id="nome_${doc.id}" value="${p.nome}">
        <input id="preco_${doc.id}" value="${p.preco}">
        <input id="imagem_${doc.id}" value="${p.imagem}">
        <button class="admin-btn" onclick="editar('${doc.id}')">Salvar</button>
        <button class="admin-btn" onclick="deletar('${doc.id}')">Excluir</button>
      </div>
      `;
    });
  });
}

// INICIALIZA
carregar();
</script>

</body>
</html>
