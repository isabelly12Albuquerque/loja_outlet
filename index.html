<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Outlet das Marias</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #ffe6ef, #fff);
}

/* SECTIONS */
.section { display:none; }
.active { display:block; }

/* NAV */
nav {
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  padding: 18px;
  text-align: center;
}

nav button {
  color: white;
  background: none;
  border: none;
  margin: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

nav button:hover {
  opacity: 0.7;
}

/* TITULO */
.titulo {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 50px;
  color: #ff4d8d;
  letter-spacing: 3px;
}

.subtitulo {
  text-align: center;
  color: #777;
  margin-bottom: 20px;
}

/* BUSCA */
#busca {
  padding: 10px;
  width: 250px;
  border-radius: 30px;
  border: none;
  outline: none;
  box-shadow: 0 4px 15px rgba(255,77,141,0.2);
}

/* CATEGORIAS */
.categorias {
  text-align:center;
  margin:15px;
}

.categorias button {
  margin: 5px;
  padding: 8px 14px;
  border-radius: 30px;
  border: none;
  background: #ff4d8d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.categorias button:hover {
  background: #e6005c;
}

/* CONTAINER PRODUTOS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  gap: 15px;
  padding: 0 15px;
}

/* CARD PRODUTO */
.produto {
  width: 150px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.produto:hover { transform: scale(1.05); }

.produto img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  object-position: top;
}

.produto-info {
  padding: 8px;
  font-size: 13px;
}

.preco {
  font-weight: bold;
  color: #ff4d8d;
}

/* BOTÃO */
.botao {
  display:block;
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  color:white;
  text-align:center;
  padding:7px;
  border-radius:20px;
  margin-top:5px;
  font-size: 12px;
  text-decoration:none;
}

/* ADMIN */
input, select {
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:1px solid #ffb3c6;
  background:#fff;
}

.admin-box {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow: 0 5px 12px rgba(255,77,141,0.2);
}
</style>
</head>
<body>

<nav>
  <button onclick="abrir('loja')">Loja</button>
  <button onclick="abrir('login')">Admin</button>
</nav>

<!-- LOJA -->
<div id="loja" class="section active">
  <h1 class="titulo">Outlet das Marias</h1>
  <p class="subtitulo">PERFUMES • ELEGÂNCIA • EXCLUSIVIDADE</p>

  <div style="text-align:center;">
    <input id="busca" name="busca_perfume" placeholder="Buscar perfume..." onkeyup="carregar()" autocomplete="off">
  </div>

  <div class="categorias">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('internacional')">Internacionais</button>
    <button onclick="filtrar('arabes')">Árabes</button>
    <button onclick="filtrar('amadeirado')">Amadeirados</button>
    <button onclick="filtrar('citrico')">Cítricos</button>
    <button onclick="filtrar('doce')">Doces</button>
  </div>

  <div id="produtos" class="container"></div>
</div>

<!-- LOGIN ADMIN -->
<div id="login" class="section">
  <h2>Login Admin</h2>
  <input id="admin_email" placeholder="Email" autocomplete="new-password"><br>
  <input id="admin_senha" type="password" placeholder="Senha" autocomplete="new-password"><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <div class="admin-box">
    <h3>Adicionar Produto</h3>
    <input id="nome" placeholder="Nome" autocomplete="off"><br>
    <input id="descricao" placeholder="Descrição" autocomplete="off"><br>
    <input id="preco" placeholder="Preço" autocomplete="off"><br>
    <input id="imagem" placeholder="URL da imagem" autocomplete="off"><br>
    <select id="categoria">
      <option value="internacional">Internacional</option>
      <option value="arabes">Árabe</option>
      <option value="amadeirado">Amadeirado</option>
      <option value="citrico">Cítrico</option>
      <option value="doce">Doce</option>
    </select><br>
    <button onclick="addProduto()">Adicionar</button>
  </div>

  <div class="admin-box">
    <h3>Produtos</h3>
    <div id="listaAdmin"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjnn8ZT_9N2oTUdhSTlEmG7ZGYy4TCycc",
  authDomain: "outlet-das-marias-c1123.firebaseapp.com",
  projectId: "outlet-das-marias-c1123",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let categoriaAtual = "todos";

function abrir(sec){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(sec).classList.add('active');
}

function filtrar(cat){
  categoriaAtual = cat;
  carregar();
}

function login(){
  let email = document.getElementById("admin_email").value;
  let senha = document.getElementById("admin_senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .then(async () => {
      let doc = await db.collection("admins").doc(email).get();
      if(doc.exists) abrir('admin');
      else alert("Sem permissão");
    }).catch(err => alert("Erro: " + err.message));
}

function addProduto(){
  let nomeP = document.getElementById("nome").value.trim();
  let descP = document.getElementById("descricao").value.trim();
  let precoP = document.getElementById("preco").value.trim();
  let imgP = document.getElementById("imagem").value.trim();
  let catP = document.getElementById("categoria").value;

  if(!nomeP || !descP || !precoP || !imgP){
    alert("Preencha todos os campos");
    return;
  }

  db.collection("produtos").add({
    nome: nomeP,
    descricao: descP,
    preco: precoP,
    imagem: imgP,
    categoria: catP
  }).then(() => {
    document.getElementById("nome").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("preco").value = "";
    document.getElementById("imagem").value = "";
  }).catch(err => alert("Erro: " + err.message));
}

// Carregar produtos otimizado
function carregar(){
  db.collection("produtos").get().then(snapshot => {
    let loja = document.getElementById("produtos");
    let admin = document.getElementById("listaAdmin");
    let busca = document.getElementById("busca")?.value?.toLowerCase() || "";

    loja.innerHTML = "";
    admin.innerHTML = "";

    snapshot.forEach(doc => {
      let p = doc.data();

      if(categoriaAtual != "todos" && p.categoria != categoriaAtual) return;
      if(!p.nome.toLowerCase().includes(busca) && !p.descricao.toLowerCase().includes(busca)) return;

      // Loja
      loja.innerHTML += `
      <div class="produto">
        <img src="${p.imagem}">
        <div class="produto-info">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>
          <p class="preco">R$ ${p.preco}</p>
          <a class="botao" href="https://wa.me/5515997869502?text=Olá,%20tenho%20interesse%20no%20produto:%20${encodeURIComponent(p.nome)}" target="_blank">Comprar</a>
        </div>
      </div>
      `;

      // Admin
      admin.innerHTML += `
      <div>
        <input id="nome_${doc.id}" value="${p.nome}" autocomplete="off">
        <input id="preco_${doc.id}" value="${p.preco}" autocomplete="off">
        <input id="imagem_${doc.id}" value="${p.imagem}" autocomplete="off">
        <button onclick="editar('${doc.id}')">Salvar</button>
        <button onclick="deletar('${doc.id}')">Excluir</button>
      </div>
      `;
    });
  }).catch(err => console.error("Erro ao carregar produtos:", err));
}

function editar(id){
  let nomeP = document.getElementById("nome_"+id).value.trim();
  let precoP = document.getElementById("preco_"+id).value.trim();
  let imgP = document.getElementById("imagem_"+id).value.trim();

  db.collection("produtos").doc(id).update({
    nome: nomeP,
    preco: precoP,
    imagem: imgP
  });
}

function deletar(id){
  db.collection("produtos").doc(id).delete();
}

carregar();
</script>
</body>
</html>
