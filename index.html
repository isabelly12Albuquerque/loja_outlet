<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Outlet das Marias</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #ffe6ef, #fff);
}

/* SECTIONS */
.section { display:none; }
.active { display:block; }

/* NAV */
nav {
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  padding: 18px;
  text-align: center;
}

nav button {
  color: white;
  background: none;
  border: none;
  margin: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

nav button:hover {
  opacity: 0.7;
}

/* TITULO */
.titulo {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 60px;
  color: #ff4d8d;
  letter-spacing: 3px;
}

.subtitulo {
  text-align: center;
  color: #777;
}

/* BUSCA */
#busca {
  padding: 12px;
  width: 280px;
  border-radius: 30px;
  border: none;
  outline: none;
  box-shadow: 0 4px 15px rgba(255,77,141,0.2);
}

/* CATEGORIAS */
.categorias {
  text-align:center;
  margin:20px;
}

.categorias button {
  margin: 6px;
  padding: 10px 18px;
  border-radius: 30px;
  border: none;
  background: #ff4d8d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.categorias button:hover {
  background: #e6005c;
}

/* PRODUTOS */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding:20px;
}

.produto {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 8px 25px rgba(255,77,141,0.2);
}

.produto:hover {
  transform: translateY(-8px);
}
  .produto h3 {
  font-size: 14px;
}

.produto p {
  font-size: 12px;
}

.produto img {
  height:180px;
}
.produto-info {
  padding:15px;
}

.preco {
  color:#ff4d8d;
  font-weight:bold;
  font-size:18px;
}

/* BOTÃO */
.botao {
  display:block;
  background: linear-gradient(90deg, #ff4d8d, #ff80ab);
  color:white;
  text-align:center;
  padding:10px;
  border-radius:30px;
  margin-top:10px;
  text-decoration:none;
}

/* ADMIN */
input, select {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:1px solid #ffb3c6;
  background:#fff;
}

.admin-box {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow: 0 5px 15px rgba(255,77,141,0.2);
}
</style>
</head>

<body>

<nav>
  <button onclick="abrir('loja')">Loja</button>
  <button onclick="abrir('login')">Admin</button>
</nav>

<div id="loja" class="section active">
  <h1 class="titulo">Outlet das Marias</h1>
  <p class="subtitulo">PERFUMES • ELEGÂNCIA • EXCLUSIVIDADE</p>

  <div style="text-align:center;">
    <input id="busca" placeholder="Buscar perfume..." onkeyup="carregar()">
  </div>

  <div class="categorias">
    <button onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('internacional')">Internacionais</button>
    <button onclick="filtrar('arabes')">Árabes</button>
    <button onclick="filtrar('amadeirado')">Amadeirados</button>
    <button onclick="filtrar('citrico')">Cítricos</button>
    <button onclick="filtrar('doce')">Doces</button>
  </div>

  <div id="produtos" class="container"></div>
</div>

<div id="login" class="section">
  <h2>Login Admin</h2>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="admin" class="section">

  <div class="admin-box">
    <h3>Adicionar Produto</h3>
    <input id="nome" placeholder="Nome"><br>
    <input id="descricao" placeholder="Descrição"><br>
    <input id="preco" placeholder="Preço"><br>
    <input id="imagem" placeholder="URL da imagem"><br>

    <select id="categoria">
      <option value="internacional">Internacional</option>
      <option value="arabes">Árabe</option>
      <option value="amadeirado">Amadeirado</option>
      <option value="citrico">Cítrico</option>
      <option value="doce">Doce</option>
    </select><br>

    <button onclick="addProduto()">Adicionar</button>
  </div>

  <div class="admin-box">
    <h3>Produtos</h3>
    <div id="listaAdmin"></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjnn8ZT_9N2oTUdhSTlEmG7ZGYy4TCycc",
  authDomain: "outlet-das-marias-c1123.firebaseapp.com",
  projectId: "outlet-das-marias-c1123",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let categoriaAtual = "todos";

function abrir(sec){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(sec).classList.add('active');
}

function filtrar(cat){
  categoriaAtual = cat;
  carregar();
}

function login(){
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
  .then(async () => {
    let doc = await db.collection("admins").doc(email).get();
    if(doc.exists){
      abrir('admin');
    } else {
      alert("Sem permissão");
    }
  });
}

function addProduto(){
  db.collection("produtos").add({
    nome: nome.value,
    descricao: descricao.value,
    preco: preco.value,
    imagem: imagem.value,
    categoria: categoria.value
  });
}

function editar(id){
  db.collection("produtos").doc(id).update({
    nome: document.getElementById("nome_"+id).value,
    preco: document.getElementById("preco_"+id).value,
    imagem: document.getElementById("imagem_"+id).value
  });
}

function deletar(id){
  db.collection("produtos").doc(id).delete();
}

function carregar(){
  db.collection("produtos").onSnapshot(snapshot => {
    let loja = document.getElementById("produtos");
    let admin = document.getElementById("listaAdmin");

    let busca = document.getElementById("busca")?.value?.toLowerCase() || "";

    loja.innerHTML = "";
    admin.innerHTML = "";

    snapshot.forEach(doc => {
      let p = doc.data();

      if(categoriaAtual != "todos" && p.categoria != categoriaAtual) return;
      if(!p.nome.toLowerCase().includes(busca) && !p.descricao.toLowerCase().includes(busca)) return;

      loja.innerHTML += `
      <div class="produto">
        <img src="${p.imagem}">
        <div class="produto-info">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>
          <p class="preco">R$ ${p.preco}</p>
          <a class="botao" href="https://wa.me/5515997134418?text=Olá,%20tenho%20interesse%20no%20produto:%20${p.nome}" target="_blank">
            Comprar
          </a>
        </div>
      </div>
      `;

      admin.innerHTML += `
      <div>
        <input id="nome_${doc.id}" value="${p.nome}">
        <input id="preco_${doc.id}" value="${p.preco}">
        <input id="imagem_${doc.id}" value="${p.imagem}">
        <button onclick="editar('${doc.id}')">Salvar</button>
        <button onclick="deletar('${doc.id}')">Excluir</button>
      </div>
      `;
    });
  });
}

carregar();
</script>

</body>
</html>
